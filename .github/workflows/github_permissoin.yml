name: github permission

on:
    workflow_dispatch:
        
jobs:
    read_only_pull_request:
        name: pull_request_read
        runs-on: ubuntu-latest
        permissions:
              pull-requests: read
        continue-on-error: true    
        steps:
            - uses: actions/checkout@v4
            - name: install and update githubCLI
              run: |
               sudo apt-get update -qq && sudo apt-get install -y gh
            - name: listing pr
              run: |
                gh pr  list --limit 5
              env:
                GH_TOKEN: ${{github.token}}

            - name: add label to pr
              env:
                GH_TOKEN: ${{github.token}}
              run: |
                   gh pr edit 1 --add-label "document as new label"
            - name: confirm the failue
              if: failure()
              run: | 
                echo "the label assign failure due to permission of the token is read only" 

    write_to_pr:
        name: assign a label to a pr
        runs-on: ubuntu-latest
        permissions:
            pull-requests: write
            issues: write
        # continue-on-error: true    
        steps:
            - uses: actions/checkout@v4

            - name: install Github CLI
              run: |
                 sudo apt-get update -qq
                 sudo apt-get install -y gh

            - name: create label
              run: |
                gh label create "NEW DOCUMENT" --color green || true
              env: 
                GH_TOKEN: ${{github.token}}  
                      
            - name: write a label
              env:
                GH_TOKEN: ${{github.token}}
              run: |
               gh pr edit 1 --add-label "NEW DOCUMENT"
            - name: write confirmation
              if: success()
              run: | 
                echo "label assignment done succesiful"
                

