name: workflow,jobs,steps

on:
    push:
        branches: ["master"]

jobs:
    job-1:
        runs-on: ubuntu-latest
        steps:
            - run: echo "this is the first step"
            - run: echo "this step will be depended by the other job"
    job-2:
        runs-on: ubuntu-latest
        steps:
            - run: echo "multiple job can run multiple"
    
    job-3:
        runs-on: ubuntu-latest
        needs:
            - job-1
            - job-2
        steps:
            - run: echo "this step run completely"
    job-4:
        runs-on: ubuntu-latest
        needs:
            - job-3
        steps:
            - run: echo "this job is completely done"                
           
