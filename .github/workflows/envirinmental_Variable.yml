name: environmental variable scope
on:
    push:
        branches:
            - master
            - features/home
env:
    WORKFLOW_VAR: SCOPE IS ALLOVER THE WORKFLOW

jobs:
    job-1:
        runs-on: ubuntu-latest
        env:
            JOB_VAR: SCOPE IS WITHIN THE JOB
        steps:
          - name: job 1 step 1
            env:
               STEP_VAR: SCOPE IS WITHIN THE STEP
            run: |
                echo "workflow var: $WORKFLOW_VAR"
                echo "Job var: $JOB_VAR"
                echo "step var: $STEP_VAR"

          - name: job 1 step 2
            run: |
             echo "workflow var: $WORKFLOW_VAR"
             echo "Job var: $JOB_VAR"
             echo "step var: $STEP_VAR"

    job-2:
        runs-on: ubuntu-latest
        steps:
            - name: job 2 step 1
              run: |
                  echo "workflow var: $WORKFLOW_VAR"
                  echo "Job var: $JOB_VAR"
                  echo "step var: $STEP_VAR"
           

