name: variable across jobs and steps

on:
    workflow_dispatch:
jobs:
    producer:
        runs-on: ubuntu-latest
        outputs:
            foo: ${{ steps.generate-foo.outputs.foo }}
        steps:
            - name: generate na export foo
              id: generate-foo
              run: |
                   foo=bofoobafoo
                    echo "foo=${foo}">> "$GITHUB_OUTPUT"
                    echo "FOO=${foo}">> "$GITHUB_ENV"

            - name: accessing the variable
              run: |
                  echo "$foo"
                  echo "$FOO"
                  echo "${{steps.generate-foo.outputs.foo}}"
                  
    consumer:
        runs-on: ubuntu-latest
        needs: producer
        steps:
            - name: accessing variables job wise
              run: |
                  echo "from local variable: $foo"
                  echo "from step wise variable: $FOO"
                  echo "from job wise variable ${{ needs.producer.outputs.foo }}"              
                    
                    