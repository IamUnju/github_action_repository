name: artifact upload and download

on:
    workflow_dispatch:

jobs:
    generating_artifact:
        name: artifact generation
        runs-on: ubuntu-latest
        steps:
            - name: artifact geneating step
              run: |
                    echo "this is the first line in artifact"> artifact.txt
                    echo "generating artifact $(date)" >> artifact.txt

            - name: uploading artifact
              uses: actions/upload-artifact@v7
              with:
                    name: my-artifact
                    path: artifact.txt

    consumming_artifact:
        name: artifact consumer
        runs-on: ubuntu-latest
        needs:
            - generating_artifact
        steps:
            - name: downloading artifact
              uses: actions/download-artifact@v7

            - name: my downloaded artifact
              run: cat artifact.txt   
