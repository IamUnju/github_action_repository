name: testing to access the environmental variable 

on:
    workflow_dispatch:
jobs:
    accessing_production_variable:
        runs-on: ubuntu-latest 
        environment: production_environment
        env:
            PRODUCTION_ENV_SCREATE_KEY: ${{ secrets.PRODUCTION_SECREATE_KEY }}
            PRODUCTION_ENV_VARIABLE: ${{ vars.PRODUCTION_ENV_VARIABLE }}         
        steps:
            - name: production environmental
              run: |
                   echo "this is the production env secreate: $PRODUCTION_ENV_SCREATE_KEY"
                   echo "this is the production env variable: $PRODUCTION_ENV_VARIABLE"     